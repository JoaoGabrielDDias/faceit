<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Segoe UI, Arial;
}

.container{

display:flex;
align-items:center;
gap:20px;

background:linear-gradient(90deg,#0b0b0b,#161616);

padding:14px 26px;
border-radius:35px;

color:white;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.levelWrap{
position:relative;
width:60px;
height:60px;
}

.levelCircle{

width:60px;
height:60px;

transform:rotate(-90deg);
}

.levelText{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);
font-weight:bold;
font-size:20px;
color:#ff5a00;
}

.elo{
font-size:32px;
font-weight:bold;
letter-spacing:1px;
}

.win{
color:#00ff7b;
font-weight:bold;
font-size:18px;
}

.loss{
color:#ff4040;
font-weight:bold;
font-size:18px;
}

.delta{
font-weight:bold;
font-size:18px;
}

.positive{
color:#00ff7b;
}

.negative{
color:#ff4040;
}

</style>

</head>

<body>

<div class="container">

<div class="levelWrap">

<svg class="levelCircle">

<circle
cx="30"
cy="30"
r="26"
stroke="#333"
stroke-width="6"
fill="none"
/>

<circle
id="progress"
cx="30"
cy="30"
r="26"
stroke="#ff5a00"
stroke-width="6"
fill="none"
stroke-dasharray="163"
stroke-dashoffset="163"
/>

</svg>

<div class="levelText" id="level">-</div>

</div>

<div class="elo" id="elo">---</div>

<div class="win">W: <span id="wins">0</span></div>

<div class="loss">L: <span id="losses">0</span></div>

<div class="delta" id="delta">(--)</div>

</div>

<script>

const API_KEY="a0c6175c-3592-4494-b2e4-3db54f1ef300";
const NICK="Moviments";

let lastElo=null;

function calcularProgresso(elo){

const levels=[0,800,950,1100,1250,1400,1550,1700,1850,2000];

let level=1;

for(let i=0;i<levels.length;i++){

if(elo>=levels[i]) level=i+1;

}

let min=levels[level-1]||0;
let max=levels[level]||elo;

let percent=(elo-min)/(max-min);

return{level,percent}

}

async function atualizar(){

const playerReq = await fetch(`https://open.faceit.com/data/v4/players?nickname=${NICK}`,{

headers:{Authorization:`Bearer ${API_KEY}`}

});

const player=await playerReq.json();

const eloAtual=player.games.cs2.faceit_elo;

document.getElementById("elo").innerText=eloAtual;

const lvlData=calcularProgresso(eloAtual);

document.getElementById("level").innerText=lvlData.level;

const circle=163;

document.getElementById("progress").style.strokeDashoffset=
circle-(circle*lvlData.percent);


// delta elo

if(lastElo!==null){

let diff=eloAtual-lastElo;

let el=document.getElementById("delta");

if(diff>0){

el.innerText=`(+${diff})`;
el.className="delta positive";

}else if(diff<0){

el.innerText=`(${diff})`;
el.className="delta negative";

}else{

el.innerText="(0)";
}

}

lastElo=eloAtual;


// W/L hoje

const historyReq=await fetch(`https://open.faceit.com/data/v4/players/${player.player_id}/history?game=cs2&limit=20`,{

headers:{Authorization:`Bearer ${API_KEY}`}

});

const history=await historyReq.json();

let wins=0;
let losses=0;

const today=new Date().toISOString().split("T")[0];

history.items.forEach(match=>{

const date=new Date(match.finished_at*1000).toISOString().split("T")[0];

if(date===today){

const winner=match.results.winner;
const team1=match.teams.faction1.team_id;

if(winner===team1) wins++;
else losses++;

}

});

document.getElementById("wins").innerText=wins;
document.getElementById("losses").innerText=losses;

}

atualizar();

setInterval(atualizar,60000);

</script>

</body>
</html>
