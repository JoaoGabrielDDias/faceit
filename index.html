<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Segoe UI, Arial;
display:flex;
justify-content:center;
}

.container{

width:200px;

display:flex;
align-items:center;
justify-content:center;
gap:8px;

background:#0d0d0d;

padding:6px 10px;
border-radius:25px;

color:white;

font-size:12px;
}

.levelCircle{

width:28px;
height:28px;

border-radius:50%;
border:3px solid #ff5500;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
font-size:12px;

color:#ff5500;
}

.name{
font-weight:bold;
font-size:12px;
}

.elo{
font-weight:bold;
}

.win{
color:#00ff7b;
font-weight:bold;
}

.loss{
color:#ff3b3b;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="levelCircle" id="level">-</div>

<div class="name" id="name">Player</div>

<div class="elo" id="elo">---</div>

<div class="win">W:<span id="wins">0</span></div>

<div class="loss">L:<span id="losses">0</span></div>

</div>

<script>

const API_KEY="a0c6175c-3592-4494-b2e4-3db54f1ef300";
const NICK="Moviments";

async function atualizar(){

const playerReq = await fetch(`https://open.faceit.com/data/v4/players?nickname=${NICK}`,{
headers:{Authorization:`Bearer ${API_KEY}`}
});

const player = await playerReq.json();

document.getElementById("name").innerText = player.nickname;

document.getElementById("level").innerText =
player.games.cs2.skill_level;

document.getElementById("elo").innerText =
player.games.cs2.faceit_elo;


// HISTORY

const historyReq = await fetch(`https://open.faceit.com/data/v4/players/${player.player_id}/history?game=cs2&limit=20`,{
headers:{Authorization:`Bearer ${API_KEY}`}
});

const history = await historyReq.json();

let wins=0;
let losses=0;

const today=new Date().toISOString().split("T")[0];

history.items.forEach(match=>{

const date=new Date(match.finished_at*1000).toISOString().split("T")[0];

if(date===today){

const winner=match.results.winner;
const team1=match.teams.faction1.team_id;

if(winner===team1){
wins++;
}else{
losses++;
}

}

});

document.getElementById("wins").innerText=wins;
document.getElementById("losses").innerText=losses;

}

atualizar();

setInterval(atualizar,60000);

</script>

</body>
</html>
