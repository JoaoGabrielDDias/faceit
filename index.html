<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FACEIT LIVE STATS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:transparent;

font-family:'Segoe UI',sans-serif;

display:flex;
justify-content:center;
align-items:center;

padding:12px;

overflow:hidden;
}

.card{

width:380px;

background:
linear-gradient(145deg,#111111,#1b1b1b);

border-radius:24px;

padding:18px;

border:1px solid rgba(255,255,255,.06);

box-shadow:
0 0 35px rgba(255,85,0,.18),
0 8px 40px rgba(0,0,0,.55);

position:relative;

overflow:hidden;

color:white;
}

.card::before{

content:"";

position:absolute;

top:-120px;
right:-120px;

width:240px;
height:240px;

background:
radial-gradient(circle,
rgba(255,85,0,.25),
transparent 70%);

}

.header{

display:flex;
align-items:center;
gap:16px;

position:relative;
z-index:2;
}

.level{

width:72px;
height:72px;

border-radius:50%;

background:
linear-gradient(145deg,#ff5500,#ff8c42);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
font-weight:900;

box-shadow:
0 0 20px rgba(255,85,0,.45);

flex-shrink:0;
}

.player{

display:flex;
flex-direction:column;
gap:5px;
}

.nickname{

font-size:22px;
font-weight:800;
letter-spacing:.3px;
}

.elo{

font-size:14px;
color:#c8c8c8;
}

.elo strong{
color:#ff8b47;
}

.region{

font-size:12px;
color:#8d8d8d;
}

.stats{

margin-top:18px;

display:grid;
grid-template-columns:repeat(3,1fr);

gap:12px;

position:relative;
z-index:2;
}

.box{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

border-radius:16px;

padding:14px 10px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

backdrop-filter:blur(5px);

transition:.25s;
}

.box:hover{

transform:translateY(-2px);

background:
rgba(255,255,255,.06);
}

.label{

font-size:11px;

text-transform:uppercase;

color:#9e9e9e;

margin-bottom:7px;

letter-spacing:.6px;
}

.value{

font-size:26px;
font-weight:900;
}

.win .value{
color:#00ff9d;
}

.loss .value{
color:#ff4b4b;
}

.total .value{
color:#58a6ff;
}

.footer{

margin-top:16px;

display:flex;
justify-content:space-between;
align-items:center;

font-size:11px;

color:#8e8e8e;

position:relative;
z-index:2;
}

.live{

display:flex;
align-items:center;
gap:6px;

color:#00ff9d;

font-weight:700;
}

.dot{

width:8px;
height:8px;

border-radius:50%;

background:#00ff9d;

animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.7);
opacity:.4;
}

100%{
transform:scale(1);
opacity:1;
}

}

.loading{

margin-top:14px;

font-size:12px;

color:#888;

text-align:center;
}

</style>

</head>

<body>

<div class="card">

<div class="header">

<div class="level" id="level">-</div>

<div class="player">

<div class="nickname" id="name">
Moviments
</div>

<div class="elo">
FACEIT ELO:
<strong id="elo">---</strong>
</div>

<div class="region" id="country">
Carregando...
</div>

</div>

</div>

<div class="stats">

<div class="box win">

<div class="label">
Vitórias Hoje
</div>

<div class="value" id="wins">
0
</div>

</div>

<div class="box loss">

<div class="label">
Derrotas Hoje
</div>

<div class="value" id="losses">
0
</div>

</div>

<div class="box total">

<div class="label">
Partidas
</div>

<div class="value" id="matches">
0
</div>

</div>

</div>

<div class="footer">

<div class="live">

<div class="dot"></div>

LIVE

</div>

<div id="updated">
--:--
</div>

</div>

<div class="loading" id="status">
Atualizando dados...
</div>

</div>

<script>

// =====================================
// CONFIG
// =====================================

const API_KEY = "a0c6175c-3592-4494-b2e4-3db54f1ef300";
const NICK = "Moviments";

// =====================================
// FUNÇÃO PRINCIPAL
// =====================================

async function atualizar(){

try{

document.getElementById("status").innerText =
"Buscando dados FACEIT...";

// =====================================
// PLAYER
// =====================================

const playerReq = await fetch(
`https://open.faceit.com/data/v4/players?nickname=${NICK}`,
{
headers:{
Authorization:`Bearer ${API_KEY}`
}
});

const player = await playerReq.json();

if(player.errors){

document.getElementById("status").innerText =
"Erro ao carregar jogador.";

return;
}

// =====================================
// DADOS PLAYER
// =====================================

document.getElementById("name").innerText =
player.nickname;

document.getElementById("level").innerText =
player.games.cs2.skill_level;

document.getElementById("elo").innerText =
player.games.cs2.faceit_elo;

document.getElementById("country").innerText =
`${player.country || "BR"} • CS2`;

// =====================================
// HISTÓRICO
// =====================================

const historyReq = await fetch(
`https://open.faceit.com/data/v4/players/${player.player_id}/history?game=cs2&limit=30`,
{
headers:{
Authorization:`Bearer ${API_KEY}`
}
});

const history = await historyReq.json();

let wins = 0;
let losses = 0;
let total = 0;

// DATA LOCAL
const hoje =
new Date().toLocaleDateString("sv-SE");

// =====================================
// VERIFICA MATCHES DE HOJE
// =====================================

history.items.forEach(match=>{

const dataPartida =
new Date(match.finished_at * 1000)
.toLocaleDateString("sv-SE");

if(dataPartida === hoje){

total++;

let meuTime = null;

// PROCURA O PLAYER NO TIME
Object.values(match.teams).forEach(team=>{

const encontrou =
team.players.some(p =>
p.nickname.toLowerCase() ===
NICK.toLowerCase()
);

if(encontrou){

meuTime = team;

}

});

// VALIDA RESULTADO
if(meuTime){

const venceu =
match.results.winner ===
meuTime.faction_id;

if(venceu){

wins++;

}else{

losses++;

}

}

}

});

// =====================================
// ATUALIZA UI
// =====================================

document.getElementById("wins").innerText =
wins;

document.getElementById("losses").innerText =
losses;

document.getElementById("matches").innerText =
total;

document.getElementById("updated").innerText =
new Date().toLocaleTimeString("pt-BR",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("status").innerText =
"Dados atualizados com sucesso.";

}catch(err){

console.error(err);

document.getElementById("status").innerText =
"Erro ao conectar API FACEIT.";

}

}

// =====================================
// START
// =====================================

atualizar();

// Atualiza a cada 60 segundos
setInterval(atualizar,60000);

</script>

</body>
</html>
