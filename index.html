<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FACEIT LIVE STATS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:transparent;

font-family:'Segoe UI',sans-serif;

display:flex;
justify-content:center;
align-items:center;

padding:12px;
overflow:hidden;

}

/* =========================
CARD
========================= */

.card{

width:390px;

background:
linear-gradient(145deg,#111111,#1b1b1b);

border-radius:24px;

padding:18px;

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 0 35px rgba(255,85,0,.18),
0 10px 40px rgba(0,0,0,.6);

overflow:hidden;
position:relative;

color:white;

}

.card::before{

content:"";

position:absolute;

top:-130px;
right:-130px;

width:260px;
height:260px;

background:
radial-gradient(circle,
rgba(255,85,0,.25),
transparent 70%);

}

/* =========================
HEADER
========================= */

.header{

display:flex;
align-items:center;
gap:16px;

position:relative;
z-index:2;
}

.level{

width:74px;
height:74px;

border-radius:50%;

background:
linear-gradient(145deg,#ff5500,#ff8d45);

display:flex;
align-items:center;
justify-content:center;

font-size:30px;
font-weight:900;

box-shadow:
0 0 25px rgba(255,85,0,.55);

flex-shrink:0;
}

.player{

display:flex;
flex-direction:column;
gap:4px;
}

.nickname{

font-size:22px;
font-weight:800;

letter-spacing:.4px;
}

.elo{

font-size:14px;
color:#cfcfcf;
}

.elo strong{
color:#ff8d45;
}

.region{

font-size:12px;
color:#8c8c8c;
}

/* =========================
STATS
========================= */

.stats{

margin-top:18px;

display:grid;
grid-template-columns:repeat(3,1fr);

gap:12px;

position:relative;
z-index:2;
}

.box{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

border-radius:16px;

padding:14px 10px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

transition:.25s;
}

.box:hover{

transform:translateY(-2px);

background:
rgba(255,255,255,.06);
}

.label{

font-size:11px;

text-transform:uppercase;

letter-spacing:.6px;

color:#9e9e9e;

margin-bottom:6px;
}

.value{

font-size:28px;
font-weight:900;
}

.win .value{
color:#00ff99;
}

.loss .value{
color:#ff4b4b;
}

.total .value{
color:#58a6ff;
}

/* =========================
FOOTER
========================= */

.footer{

margin-top:16px;

display:flex;
justify-content:space-between;
align-items:center;

font-size:11px;

color:#8e8e8e;

position:relative;
z-index:2;
}

.live{

display:flex;
align-items:center;
gap:6px;

color:#00ff99;
font-weight:700;
}

.dot{

width:8px;
height:8px;

border-radius:50%;

background:#00ff99;

animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.7);
opacity:.4;
}

100%{
transform:scale(1);
opacity:1;
}

}

.status{

margin-top:14px;

font-size:12px;

text-align:center;

color:#888;

position:relative;
z-index:2;
}

</style>

</head>

<body>

<div class="card">

<div class="header">

<div class="level" id="level">
-
</div>

<div class="player">

<div class="nickname" id="name">
Moviments
</div>

<div class="elo">
FACEIT ELO:
<strong id="elo">---</strong>
</div>

<div class="region" id="country">
Carregando...
</div>

</div>

</div>

<div class="stats">

<div class="box win">

<div class="label">
Vitórias Hoje
</div>

<div class="value" id="wins">
0
</div>

</div>

<div class="box loss">

<div class="label">
Derrotas Hoje
</div>

<div class="value" id="losses">
0
</div>

</div>

<div class="box total">

<div class="label">
Partidas
</div>

<div class="value" id="matches">
0
</div>

</div>

</div>

<div class="footer">

<div class="live">

<div class="dot"></div>

LIVE

</div>

<div id="updated">
--:--
</div>

</div>

<div class="status" id="status">
Conectando FACEIT...
</div>

</div>

<script>

// ======================================
// CONFIG
// ======================================

const API_KEY = "a0c6175c-3592-4494-b2e4-3db54f1ef300";
const NICK = "Moviments";

// ======================================
// UPDATE
// ======================================

async function atualizar(){

try{

document.getElementById("status").innerText =
"Buscando dados da FACEIT...";

// ======================================
// PLAYER
// ======================================

const playerReq = await fetch(
`https://open.faceit.com/data/v4/players?nickname=${NICK}`,
{
headers:{
Authorization:`Bearer ${API_KEY}`
}
});

const player = await playerReq.json();

if(player.errors){

document.getElementById("status").innerText =
"Erro ao buscar jogador.";

return;
}

// ======================================
// PLAYER INFO
// ======================================

document.getElementById("name").innerText =
player.nickname;

document.getElementById("level").innerText =
player.games.cs2.skill_level;

document.getElementById("elo").innerText =
player.games.cs2.faceit_elo;

document.getElementById("country").innerText =
`${player.country || "BR"} • CS2`;

// ======================================
// HISTORY
// ======================================

const historyReq = await fetch(
`https://open.faceit.com/data/v4/players/${player.player_id}/history?game=cs2&limit=20`,
{
headers:{
Authorization:`Bearer ${API_KEY}`
}
});

const history = await historyReq.json();

let wins = 0;
let losses = 0;
let total = 0;

const hoje =
new Date().toLocaleDateString("sv-SE");

// ======================================
// MATCH LOOP
// ======================================

for(const item of history.items){

const dataPartida =
new Date(item.finished_at * 1000)
.toLocaleDateString("sv-SE");

if(dataPartida !== hoje){
continue;
}

total++;

try{

// ======================================
// MATCH DETAILS
// ======================================

const detailReq = await fetch(
`https://open.faceit.com/data/v4/matches/${item.match_id}`,
{
headers:{
Authorization:`Bearer ${API_KEY}`
}
});

const detail = await detailReq.json();

let meuTime = null;

// ======================================
// PROCURA PLAYER
// ======================================

Object.values(detail.teams).forEach(team=>{

const encontrou = team.players.some(player=>
player.nickname.toLowerCase() ===
NICK.toLowerCase()
);

if(encontrou){
meuTime = team;
}

});

// ======================================
// RESULTADO
// ======================================

if(meuTime){

if(detail.results.winner === meuTime.faction_id){

wins++;

}else{

losses++;

}

}

}catch(matchError){

console.log("Erro match:",matchError);

}

}

// ======================================
// UI UPDATE
// ======================================

document.getElementById("wins").innerText =
wins;

document.getElementById("losses").innerText =
losses;

document.getElementById("matches").innerText =
total;

document.getElementById("updated").innerText =
new Date().toLocaleTimeString("pt-BR",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("status").innerText =
"Dados atualizados com sucesso.";

}catch(err){

console.error(err);

document.getElementById("status").innerText =
"Erro ao conectar API FACEIT.";

}

}

// ======================================
// START
// ======================================

atualizar();

// Atualiza a cada 60 segundos
setInterval(atualizar,60000);

</script>

</body>
</html>
